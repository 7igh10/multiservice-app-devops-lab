name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/multiservice-app-backend:${{ steps.version.outputs.VERSION }} ./backend

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/multiservice-app-frontend:${{ steps.version.outputs.VERSION }} ./frontend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/multiservice-app-backend:${{ steps.version.outputs.VERSION }}

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/multiservice-app-frontend:${{ steps.version.outputs.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/apps/multiservice-app

            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}

            cd /projects/multiservice-app

            VERSION=${{ needs.build-and-push.outputs.version }}

            echo "Deploying version $VERSION"
            ./deploy-blue-green.sh $VERSION
